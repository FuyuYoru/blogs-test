
services:
  php:
    build: .
    container_name: blog_php
    volumes:
      - .:/var/www
    depends_on:
      - mysql
    networks:
      - blog_net
    # Убираем ports для PHP-FPM
    # ports:
    #   - "8080:80"

  nginx:
    image: nginx:latest
    container_name: blog_nginx
    ports:
      - "8080:80"          # теперь только Nginx маппится на 8080
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - blog_net

  mysql:
    image: mysql:8
    container_name: blog_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog_test
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - blog_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: blog_pma
    ports:
      - "8081:80"          # phpMyAdmin на 8081
    environment:
      PMA_HOST: mysql
    networks:
      - blog_net

networks:
  blog_net:
    driver: bridge