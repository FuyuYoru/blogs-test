
services:
  php:
    image: php:8.2-fpm
    container_name: blog_php
    volumes:
      - .:/var/www
    working_dir: /var/www
    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: blog_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql:8
    container_name: blog_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: blog_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
